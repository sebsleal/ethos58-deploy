<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  body { background: #888; display: flex; align-items: center; justify-content: center; gap: 40px; min-height: 100vh; margin: 0; font-family: sans-serif; flex-wrap: wrap; padding: 40px; box-sizing: border-box; }
  .label { text-align: center; color: #fff; font-size: 12px; margin-top: 10px; line-height: 1.4; }
  .group { display: flex; flex-direction: column; align-items: center; }
  h2 { width: 100%; text-align: center; color: #fff; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.5; margin: 0 0 6px; }
  .row { display: flex; gap: 40px; align-items: flex-end; flex-wrap: wrap; justify-content: center; width: 100%; }
  .divider { width: 100%; height: 1px; background: rgba(255,255,255,0.15); margin: 28px 0 10px; }
</style>
</head>
<body>

<h2>Direction options — 200px</h2>
<div class="row">

  <!-- A: Clean geometric E -->
  <div class="group">
    <svg width="180" height="180" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#1a1714"/>
      <g fill="none" stroke="#f3eee8" stroke-width="9" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="64" y1="52" x2="140" y2="52"/>
        <line x1="64" y1="148" x2="140" y2="148"/>
        <line x1="64" y1="100" x2="124" y2="100"/>
        <line x1="64" y1="52" x2="64" y2="148"/>
      </g>
    </svg>
    <div class="label">A — Pure geometric E<br/><span style="opacity:0.6;font-size:10px">clean, no gimmicks</span></div>
  </div>

  <!-- B: Contained signal blip in middle bar only -->
  <div class="group">
    <svg width="180" height="180" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#1a1714"/>
      <g fill="none" stroke="#f3eee8" stroke-width="9" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="64" y1="52" x2="140" y2="52"/>
        <line x1="64" y1="148" x2="140" y2="148"/>
        <line x1="64" y1="52" x2="64" y2="148"/>
      </g>
      <!-- middle bar: flat approach, S-curve blip in centre, flat exit — all fully contained -->
      <path d="M64 100 L80 100 C86 100 88 84 100 84 C112 84 114 116 120 116 C126 116 128 100 134 100 L140 100"
            fill="none" stroke="#f3eee8" stroke-width="9" stroke-linecap="butt" stroke-linejoin="round"/>
    </svg>
    <div class="label">B — Signal blip (S-curve)<br/><span style="opacity:0.6;font-size:10px">telemetry feel, contained</span></div>
  </div>

  <!-- C: Solid filled E block -->
  <div class="group">
    <svg width="180" height="180" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#1a1714"/>
      <path d="M56 44 H144 V64 H76 V91 H132 V109 H76 V136 H144 V156 H56 Z" fill="#f3eee8"/>
    </svg>
    <div class="label">C — Solid / filled E<br/><span style="opacity:0.6;font-size:10px">bold, high contrast</span></div>
  </div>

  <!-- D: Bar-end tick marks (no wave) -->
  <div class="group">
    <svg width="180" height="180" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#1a1714"/>
      <g fill="none" stroke="#f3eee8" stroke-width="9" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="64" y1="52" x2="140" y2="52"/>
        <line x1="64" y1="148" x2="140" y2="148"/>
        <line x1="64" y1="100" x2="122" y2="100"/>
        <line x1="64" y1="52" x2="64" y2="148"/>
        <!-- serif ticks at right end of each bar -->
        <line x1="140" y1="46" x2="140" y2="58"/>
        <line x1="140" y1="142" x2="140" y2="154"/>
        <line x1="122" y1="94" x2="122" y2="106"/>
      </g>
    </svg>
    <div class="label">D — Serif tick marks<br/><span style="opacity:0.6;font-size:10px">structured, typographic</span></div>
  </div>

</div>

<div class="divider"></div>
<h2>Same options at home-screen size (80px)</h2>

<div class="row">
  <!-- A small -->
  <div class="group">
    <svg width="80" height="80" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#1a1714"/>
      <g fill="none" stroke="#f3eee8" stroke-width="9" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="64" y1="52" x2="140" y2="52"/>
        <line x1="64" y1="148" x2="140" y2="148"/>
        <line x1="64" y1="100" x2="124" y2="100"/>
        <line x1="64" y1="52" x2="64" y2="148"/>
      </g>
    </svg>
    <div class="label">A</div>
  </div>
  <!-- B small -->
  <div class="group">
    <svg width="80" height="80" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#1a1714"/>
      <g fill="none" stroke="#f3eee8" stroke-width="9" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="64" y1="52" x2="140" y2="52"/>
        <line x1="64" y1="148" x2="140" y2="148"/>
        <line x1="64" y1="52" x2="64" y2="148"/>
      </g>
      <path d="M64 100 L80 100 C86 100 88 84 100 84 C112 84 114 116 120 116 C126 116 128 100 134 100 L140 100"
            fill="none" stroke="#f3eee8" stroke-width="9" stroke-linecap="butt" stroke-linejoin="round"/>
    </svg>
    <div class="label">B</div>
  </div>
  <!-- C small -->
  <div class="group">
    <svg width="80" height="80" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#1a1714"/>
      <path d="M56 44 H144 V64 H76 V91 H132 V109 H76 V136 H144 V156 H56 Z" fill="#f3eee8"/>
    </svg>
    <div class="label">C</div>
  </div>
  <!-- D small -->
  <div class="group">
    <svg width="80" height="80" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="44" fill="#1a1714"/>
      <g fill="none" stroke="#f3eee8" stroke-width="9" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="64" y1="52" x2="140" y2="52"/>
        <line x1="64" y1="148" x2="140" y2="148"/>
        <line x1="64" y1="100" x2="122" y2="100"/>
        <line x1="64" y1="52" x2="64" y2="148"/>
        <line x1="140" y1="46" x2="140" y2="58"/>
        <line x1="140" y1="142" x2="140" y2="154"/>
        <line x1="122" y1="94" x2="122" y2="106"/>
      </g>
    </svg>
    <div class="label">D</div>
  </div>
</div>

</body>
</html>
